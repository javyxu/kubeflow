<div class="form-title">{{ 'volume.storageClass' | translate }}</div>

<mat-checkbox
  [checked]="scControl?.disabled"
  (change)="useDefaultSC($event.checked)"
>
  {{ 'volume.cbxDefaultClass' | translate}}  
</mat-checkbox>

<mat-form-field appearance="outline" class="wide" *ngIf="scControl">
  <mat-label>{{ 'volume.lblClass' | translate }}</mat-label>
  <mat-select [formControl]="scControl">
    <mat-option value="">{{ 'volume.optEmptyClass' | translate }}</mat-option>
    <mat-option *ngFor="let sc of storageClasses" [value]="sc">
      {{ sc }}
    </mat-option>
  </mat-select>
</mat-form-field>
