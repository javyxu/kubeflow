<lib-form-section
  title="{{ 'formSpecs.cpuRam' | translate }}"
>
  <div class="row">
    <!--CPU-->
    <lib-positive-number-input
      class="column"
      min="0"
      step="0.1"
      [sizeControl]="parentForm.get('cpu')"
      label="{{ 'formSpecs.requestedCpu' | translate }}"
    ></lib-positive-number-input>

    <!--RAM-->
    <lib-positive-number-input
      class="column"
      min="0"
      step="0.1"
      [sizeControl]="parentForm.get('memory')"
      label="{{ 'formSpecs.requestedRamSize' | translate }}"
    ></lib-positive-number-input>
  </div>

  <lib-advanced-options>
    <div class="row">
      <!--CPU-->
      <div class="column">
        <mat-form-field appearance="outline" class="wide">
          <mat-label>{{ 'formSpecs.limitedCpu' | translate }}</mat-label>
          <input
            matInput
            type="number"
            min="0.1"
            step="0.1"
            [formControl]="parentForm.get('cpuLimit')"
          />
        </mat-form-field>
      </div>

      <!--RAM-->
      <div class="column">
        <mat-form-field appearance="outline" class="wide">
          <mat-label>{{ 'formSpecs.limitedRamSize' | translate }}</mat-label>
          <input
            matInput
            type="number"
            min="0.1"
            step="0.1"
            [formControl]="parentForm.get('memoryLimit')"
          />
        </mat-form-field>
      </div>
    </div>
  </lib-advanced-options>
</lib-form-section>
